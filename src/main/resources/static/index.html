<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaForge AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #f8f6f1;
          --surface: #ffffff;
          --border: #e4dfd4;
          --border2: #cdc7bc;
          --ink: #1a1714;
          --body: #5a5249;
          --muted: #9e9488;
          --accent: #d4601a;
          --accent2: #2563eb;
          --card-shadow: 0 2px 10px rgba(0,0,0,.08);
          --card-shadow-hover: 0 4px 16px rgba(0,0,0,.12);
        }

        *, *::before, *::after {margin:0;padding:0;box-sizing:border-box;}
        body {
          background: var(--bg);
          font-family:'Inter', sans-serif;
          color: var(--ink);
          min-height:100vh;
          line-height:1.6;
        }

        /* NAVIGATION */
        nav {
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:16px 40px;
          background: rgba(248,246,241,0.9);
          backdrop-filter: blur(20px);
          border-bottom:1px solid var(--border);
          position:sticky;
          top:0;
          z-index:10;
        }
        .logo {
          font-weight:700;
          font-size:18px;
          text-decoration:none;
          color: var(--ink);
          display:flex;
          align-items:center;
          gap:8px;
        }
        .logo-mark {
          background: var(--ink);
          color:#fff;
          font-size:14px;
          width:30px; height:30px;
          display:grid; place-items:center;
          border-radius:6px;
        }

        /* HERO */
        .hero {
          text-align:center;
          padding:80px 20px 40px;
        }
        .hero-eyebrow {
          font-family:'JetBrains Mono', monospace;
          font-size:12px;
          color:var(--muted);
          letter-spacing:2px;
          text-transform:uppercase;
          margin-bottom:16px;
        }
        .hero h1 {
          font-weight:700;
          font-size: clamp(32px, 6vw, 64px);
          color: var(--ink);
        }
        .hero em { color: var(--accent); font-style:normal; }
        .hero-sub {
          font-size:16px;
          max-width:500px;
          margin:12px auto 0;
          color: var(--body);
        }

        /* FORM */
        .generator { max-width:700px; margin:40px auto; padding:0 20px; }
        .form-card {
          background: var(--surface);
          border:1px solid var(--border);
          border-radius:16px;
          padding:24px;
          box-shadow: var(--card-shadow);
        }
        .fields-grid {
          display:grid;
          gap:12px;
          grid-template-columns:1fr 1fr;
          margin-bottom:16px;
        }
        @media(max-width:500px){ .fields-grid{ grid-template-columns:1fr; } }
        .field label {
          display:block;
          font-weight:600;
          font-size:14px;
          margin-bottom:6px;
        }
        .field input {
          width:100%;
          padding:10px 12px;
          border:1px solid var(--border);
          border-radius:10px;
          font-size:14px;
          transition:border-color .2s;
        }
        .field input:focus { outline:none; border-color:var(--accent2); }

        .gen-btn {
          width:100%;
          padding:14px;
          font-weight:600;
          font-size:16px;
          border:none;
          border-radius:12px;
          color:#fff;
          background: var(--ink);
          cursor:pointer;
          position:relative;
        }
        .gen-btn:hover { background:#2a2420; }
        .gen-btn:disabled { opacity:0.5; cursor:not-allowed; }

        /* LOADER */
        .loader { display:none; padding:16px 0; }
        .loader.active { display:block; }
        .loader-track { width:100%; height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:8px; }
        .loader-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); animation:sweep 1.8s infinite; }
        @keyframes sweep {0%{width:0}50%{width:60%}100%{width:0}}
        .loader-text { text-align:center; font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--muted); }

        /* RESULTS */
        .results-wrap { max-width:900px; margin:40px auto; padding:0 20px; }
        .results-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
        .results-eyebrow { font-family:'JetBrains Mono', monospace; font-size:12px; text-transform:uppercase; color:var(--muted); }
        .results-rule { flex:1; height:1px; background:var(--border); }
        .results-count { font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--accent); border:1px solid rgba(212,96,26,.25); border-radius:100px; padding:2px 10px; }

        /* CARDS */
        .cards-list { display:flex; flex-direction:column; gap:16px; }
        .idea-card {
          display:flex; border-radius:16px; overflow:hidden;
          background: var(--surface);
          border:1px solid var(--border);
          box-shadow:var(--card-shadow);
          cursor:pointer;
          transition: all 0.2s ease;
        }
        .idea-card:hover { box-shadow: var(--card-shadow-hover); transform:translateY(-2px); }
        .card-stripe { width:4px; background:var(--stripe-color,var(--accent)); flex-shrink:0; }
        .card-body { padding:20px; flex:1; display:flex; flex-direction:column; gap:10px; }
        .card-top { display:flex; justify-content:space-between; align-items:center; }
        .card-badge { font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--stripe-color,var(--accent)); }
        .card-title { font-weight:700; font-size:18px; color: var(--ink); }
        .card-desc { font-size:14px; color: var(--body); }
        .card-desc strong { font-weight:700; }
        .card-tags { display:flex; flex-wrap:wrap; gap:6px; }
        .ktag { font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--body); background:#f0ece4; border-radius:6px; padding:2px 8px; }

        /* FOOTER */
        footer { padding:40px 20px; background:#f2efe8; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; justify-content:space-between; gap:16px; }
        .footer-left, .footer-right { display:flex; flex-direction:column; gap:8px; }
        .footer-logo { font-weight:700; text-decoration:none; color: var(--ink); display:flex; align-items:center; gap:8px; }
        .footer-copy { font-size:12px; color:var(--muted); }
        .footer-link { font-family:'JetBrains Mono', monospace; font-size:11px; text-decoration:none; color:var(--body); margin-top:4px; }
        .footer-link:hover { color: var(--accent); }

        /* KEYFRAMES */
        @keyframes up { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="#"><div class="logo-mark">⚡</div>IdeaForge</a>
</nav>

<div class="hero">
    <div class="hero-eyebrow">Project Idea Generator</div>
    <h1>Ideas worth <em>building</em></h1>
    <p class="hero-sub">Enter your stack, domain, and experience level. Get clean, professional project ideas instantly.</p>
</div>

<div class="generator">
    <div class="form-card">
        <div class="fields-grid">
            <div class="field">
                <label>Tech Stack</label>
                <input type="text" id="tech" placeholder="Java, MERN, Python…" />
            </div>
            <div class="field">
                <label>Domain</label>
                <input type="text" id="domain" placeholder="Fintech, Health, EdTech…" />
            </div>
        </div>
        <div class="fields-grid">
            <div class="field">
                <label>Experience Level</label>
                <input type="text" id="level" placeholder="Beginner / Mid / Senior" />
            </div>
            <div class="field">
                <label>Interest Area</label>
                <input type="text" id="interest" placeholder="ML, APIs, Real-time…" />
            </div>
        </div>
        <button class="gen-btn" id="genBtn" onclick="generateIdeas()">⚡ Generate Project Ideas</button>
        <div class="loader" id="loader">
            <div class="loader-track"><div class="loader-fill"></div></div>
            <div class="loader-text">FORGING IDEAS…</div>
        </div>
    </div>
</div>

<div class="results-wrap" id="resultsWrap" style="display:none">
    <div class="results-header">
        <span class="results-eyebrow">Ideas</span>
        <div class="results-rule"></div>
        <span class="results-count" id="countBadge">0 generated</span>
    </div>
    <div class="cards-list" id="projects"></div>
</div>

<footer>
    <div class="footer-left">
        <a href="#" class="footer-logo"><span>⚡</span> IdeaForge AI</a>
        <div class="footer-copy">&copy; 2026 Crafted for builders.</div>
    </div>
    <div class="footer-right">
        <a href="#" class="footer-link">System Operational</a>
        <a href="#" class="footer-link">GitHub</a>
    </div>
</footer>

<script>
    const STRIPES = ['#d4601a','#2563eb','#059669','#7c3aed','#db2777','#b45309'];
    const KEYWORDS = ['AI','Machine Learning','Computer Vision','NLP','Blockchain','IoT','Real-time','WebSockets','OAuth','Payments','Analytics','Dashboard','GraphQL','REST API','Firebase','Docker','Cloud','Microservices','Recommender','Search','Chat','Maps','AR','Mobile','PWA','Web3'];

    function extractTags(text){ return KEYWORDS.filter(k => text.toLowerCase().includes(k.toLowerCase())).slice(0,5); }
    function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    async function generateIdeas(){
      const btn = document.getElementById('genBtn');
      const loader = document.getElementById('loader');
      const list = document.getElementById('projects');
      const wrap = document.getElementById('resultsWrap');
      const badge = document.getElementById('countBadge');

      list.innerHTML = '';
      wrap.style.display = 'none';
      loader.classList.add('active');
      btn.disabled = true;
      btn.textContent = 'Generating…';

      try{
        const res = await fetch('/api/generate',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            techStack: document.getElementById('tech').value,
            domain: document.getElementById('domain').value,
            level: document.getElementById('level').value,
            interest: document.getElementById('interest').value
          })
        });

        const raw = await res.text();
        const ideas = raw.split(/\n/).filter(s=>s.trim());

        loader.classList.remove('active');
        btn.disabled = false;
        btn.textContent = '⚡ Generate Project Ideas';

        if(!ideas.length) return;

        wrap.style.display = 'block';
        badge.textContent = ideas.length + ' generated';

        ideas.forEach((idea,i)=>{
          const clean = idea.replace(/[#\*\-]/g,'').trim();
          const tags = extractTags(clean);
          const color = STRIPES[i%STRIPES.length];

          const card = document.createElement('div');
          card.className='idea-card';
          card.style.setProperty('--stripe-color', color);
          card.style.animationDelay=(i*0.05)+'s';
          card.innerHTML=`
            <div class="card-stripe"></div>
            <div class="card-body">
              <div class="card-top">
                <span class="card-badge">Idea ${String(i+1).padStart(2,'0')}</span>
              </div>
              <div class="card-title">Project Idea</div>
              <p class="card-desc"><strong>${esc(clean)}</strong></p>
              ${tags.length? `<div class="card-tags">${tags.map(t=>`<span class="ktag">${esc(t)}</span>`).join('')}</div>` : ''}
            </div>
          `;
          list.appendChild(card);
        });

        wrap.scrollIntoView({behavior:'smooth', block:'start'});

      } catch(e){
        loader.classList.remove('active');
        btn.disabled = false;
        btn.textContent = '⚡ Generate Project Ideas';
        alert('Something went wrong. Please try again.');
      }
    }

    document.addEventListener('keydown', e => {
      if(e.key==='Enter' && !document.getElementById('genBtn').disabled) generateIdeas();
    });
</script>
</body>
</html>
