<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaForge AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #0f172a 60%);
            color: #e2e8f0;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 25px 50px;
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            color: #60a5fa;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-top: 40px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .hero p {
            color: #94a3b8;
            font-size: 18px;
        }

        /* GENERATOR */
        .generator {
            max-width: 750px;
            margin: 50px auto;
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg,#3b82f6,#6366f1);
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* LOADER */
        .loader {
            display: none;
            margin: 25px auto;
            border: 4px solid #1e293b;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* RESULTS */
        .results {
            max-width: 850px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .project {
            background: #1e293b;
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .project:hover {
            transform: translateY(-4px);
        }

        .project h3 {
            color: #60a5fa;
            margin-bottom: 10px;
        }

        .project p {
            color: #cbd5e1;
            line-height: 1.6;
        }

        /* MOBILE */
        @media(max-width:600px){
            .hero h1 {
                font-size: 28px;
            }

            nav {
                padding: 20px;
            }

            .generator {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">IdeaForge AI</div>
</nav>

<div class="hero">
    <h1>Generate Industry-Level Project Ideas</h1>
    <p>AI-powered suggestions tailored to your skills and interests</p>
</div>

<div class="generator">
    <input type="text" id="tech" placeholder="Tech Stack (Java Fullstack)">
    <input type="text" id="domain" placeholder="Domain (Fintech, Health, EdTech)">
    <input type="text" id="level" placeholder="Experience Level">
    <input type="text" id="interest" placeholder="Interest Area">

    <button onclick="generateIdeas()">Generate Ideas</button>
    <div class="loader" id="loader"></div>
</div>

<div class="results" id="projects"></div>

<script>
    async function generateIdeas() {

        const loader = document.getElementById("loader");
        const projectsDiv = document.getElementById("projects");

        projectsDiv.innerHTML = "";
        loader.style.display = "block";

        const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                techStack: document.getElementById("tech").value,
                domain: document.getElementById("domain").value,
                level: document.getElementById("level").value,
                interest: document.getElementById("interest").value
            })
        });

        const text = await response.text();
        loader.style.display = "none";

        const ideas = text.split(/\n\d+\.\s/).filter(i => i.trim() !== "");

        ideas.forEach(idea => {

            const card = document.createElement("div");
            card.className = "project";

            const lines = idea.split("\n");

            const title = document.createElement("h3");
            title.innerText = lines[0];

            const desc = document.createElement("p");
            desc.innerText = lines.slice(1).join(" ");

            card.appendChild(title);
            card.appendChild(desc);
            projectsDiv.appendChild(card);
        });
    }
</script>

</body>
</html>
