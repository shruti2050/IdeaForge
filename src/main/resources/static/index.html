<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>IdeaForge AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #f8f6f1; --bg2: #f2efe8; --surface: #ffffff;
          --border: #e4dfd4; --border2: #cdc7bc;
          --ink: #1a1714; --ink2: #3d3730; --body: #5a5249;
          --muted: #9e9488; --accent: #d4601a; --accent2: #2563eb;
          --tag-bg: #f0ece4; --tag-text: #7a6e62;
          --card-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
          --card-shadow-hover: 0 2px 8px rgba(0,0,0,.08), 0 16px 40px rgba(0,0,0,.10);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; min-height: 100dvh; }

        /* NAV & HERO (Shortened for brevity) */
        nav { position: sticky; top:0; z-index:100; display: flex; align-items:center; justify-content:space-between; padding: 18px 60px; background: rgba(248,246,241,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { display:flex; align-items:center; gap:10px; font-weight:700; text-decoration:none; color: var(--ink); }
        .logo-mark { width:30px; height:30px; background: var(--ink); border-radius:8px; display:grid; place-items:center; color:#fff; }

        .hero { text-align:center; padding: 80px 20px 40px; }
        .hero h1 { font-weight: 800; font-size: clamp(32px, 7vw, 72px); letter-spacing: -0.04em; margin-bottom: 10px; }
        .hero h1 em { font-style: normal; color: var(--accent); }
        .hero-sub { color: var(--body); max-width: 500px; margin: 0 auto; }

        /* FORM */
        .generator { width:min(680px,100%); margin:0 auto 60px; padding:0 20px; }
        .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: var(--card-shadow); }
        .fields-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
        @media(max-width:460px){ .fields-grid { grid-template-columns:1fr; } }
        .field label { display:block; font-size:11px; font-weight:600; color: var(--ink2); margin-bottom:7px; }
        .field input { width:100%; padding:12px; background: var(--bg); border:1px solid var(--border); border-radius:10px; font-size:14px; }
        .gen-btn { width:100%; padding:16px; background:var(--ink); border:none; border-radius:12px; color:#fff; font-weight:600; cursor:pointer; margin-top: 10px; }

        /* LOADER */
        .loader { display:none; padding:20px 0; }
        .loader.active { display:block; }
        .loader-track { width:100%; height:2px; background:var(--border); overflow:hidden; }
        .loader-fill { height:100%; background:var(--accent); animation: sweep 2s infinite; }
        @keyframes sweep { 0% { width:0; margin-left:0; } 50% { width:50%; } 100% { width:0; margin-left:100%; } }

        /* RESULTS - CRITICAL FIX HERE */
        .results-wrap { width:min(800px,100%); margin:0 auto 100px; padding:0 20px; }
        .idea-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; display: flex; overflow: hidden; box-shadow: var(--card-shadow); }
        .card-stripe { width: 5px; background: var(--stripe-color); }
        .card-body { padding: 25px; flex: 1; }
        .card-title { font-weight: 700; font-size: 20px; margin-bottom: 10px; color: var(--ink); }

        /* THE FIX FOR THE WALL OF TEXT */
        .card-desc {
            white-space: pre-wrap; /* This makes \n actual line breaks */
            font-size: 15px;
            line-height: 1.7;
            color: var(--body);
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .card-tags { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .ktag { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: var(--tag-bg); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<nav><a class="logo" href="#"><div class="logo-mark">⚡</div>IdeaForge</a></nav>

<div class="hero">
    <h1>Ideas worth <em>building</em></h1>
    <p class="hero-sub">Get industry-ready project ideas instantly.</p>
</div>

<div class="generator">
    <div class="form-card">
        <div class="fields-grid">
            <div class="field"><label>Tech Stack</label><input type="text" id="tech" placeholder="e.g. Java, React"></div>
            <div class="field"><label>Domain</label><input type="text" id="domain" placeholder="e.g. Fintech"></div>
        </div>
        <div class="fields-grid">
            <div class="field"><label>Experience</label><input type="text" id="level" placeholder="e.g. Mid-level"></div>
            <div class="field"><label>Interest</label><input type="text" id="interest" placeholder="e.g. ML, Security"></div>
        </div>
        <button class="gen-btn" id="genBtn" onclick="generateIdeas()">⚡ Generate Ideas</button>
        <div class="loader" id="loader"><div class="loader-track"><div class="loader-fill"></div></div></div>
    </div>
</div>

<div class="results-wrap" id="resultsWrap" style="display:none">
    <div id="projects"></div>
</div>

<script>
    const STRIPES = ['#d4601a','#2563eb','#059669','#7c3aed'];
    const KEYWORDS = ['AI','ML','API','Java','React','Blockchain','Fintech','Security'];

   async function generateIdeas(){
  const btn = document.getElementById('genBtn');
  const loader = document.getElementById('loader');
  const list = document.getElementById('projects');
  const wrap = document.getElementById('resultsWrap');

  list.innerHTML = '';
  wrap.style.display = 'none';
  loader.classList.add('active');
  btn.disabled = true;

  try {
    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        techStack: document.getElementById('tech').value,
        domain:    document.getElementById('domain').value,
        level:     document.getElementById('level').value,
        interest:  document.getElementById('interest').value
      })
    });

    const raw = await res.text();

    // 1. IMPROVED SPLIT: Look for "Project Idea X" or "Idea X" or "##"
    let ideas = raw.split(/(?=Project Idea \d|## Project Idea \d|Idea \d:|\n\d+\.)/gi)
                   .filter(s => s.trim().length > 50);

    loader.classList.remove('active');
    btn.disabled = false;
    wrap.style.display = 'block';

    ideas.forEach((content, i) => {
      // 2. CONVERT MARKDOWN STARS TO HTML BOLD TAGS
      let formattedContent = content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') // Fixes the **stars**
        .replace(/^\d+\.\s+/, '') // Removes leading numbers
        .replace(/##\s+/g, '');   // Removes ## headers

      const lines = formattedContent.split('\n').filter(l => l.trim());
      const title = lines[0] || "Project Idea";
      const desc  = lines.slice(1).join('<br>'); // Use <br> for spacing inside cards

      const card = document.createElement('div');
      card.className = 'idea-card';
      card.style.setProperty('--stripe-color', STRIPES[i % STRIPES.length]);

      card.innerHTML = `
        <div class="card-stripe"></div>
        <div class="card-body">
          <div class="card-top">
            <span class="card-badge">FORGE ${String(i+1).padStart(2,'0')}</span>
          </div>
          <div class="card-title">${title}</div>
          <div class="card-desc">${desc}</div>
        </div>
      `;
      list.appendChild(card);
    });

  } catch(e) {
    loader.classList.remove('active');
    btn.disabled = false;
    alert('Deployment successful, but API call failed. Check Render logs.');
  }
}
</script>
</body>
</html>
